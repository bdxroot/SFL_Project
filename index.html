<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cutting & OC Planning Tool | Sewtech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #daf4ec;
            --primary-green: #0a5e46;
            --accent-green: #1f8868;
            --white: #ffffff;
            --text-dark: #1e3b33;
            --border-light: #cde3db;
            --shadow-sm: 0 4px 12px rgba(0, 32, 16, 0.04);
            --shadow-md: 0 8px 24px rgba(0, 32, 16, 0.08);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            background: linear-gradient(145deg, #daf4ec 0%, #c2e3d9 100%);
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header / Navbar --- */
        header {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* --- নতুন টাইপিং ও গায়েব হওয়ার অ্যানিমেশন CSS --- */
        .brand-container {
            display: inline-flex;
            align-items: center;
        }

        .brand-text {
            font-family: 'Rubik Glitch', cursive;
            font-size: 1.6rem;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--primary-green), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            border-right: 3px solid var(--primary-green); /* টাইপিং কার্সার */
            animation: 
                typeAndErase 12s steps(40) infinite,
                blinkCursor 0.75s step-end infinite;
        }

        /* টাইপিং এবং এক একটি শব্দ উল্টো করে কাটার কিফ্রেম */
        @keyframes typeAndErase {
            0% { width: 0; }                        /* একদম শুরুতে খালি */
            15%, 30% { width: 100%; }               /* পুরো লেখা "Sewtech Fashion Limited" টাইপ হবে */
            38%, 48% { width: 16ch; }               /* "Limited" গায়েব হবে, থাকবে "Sewtech Fashion " */
            56%, 66% { width: 8ch; }                /* "Fashion" গায়েব হবে, থাকবে "Sewtech " */
            74%, 88% { width: 0; }                  /* "Sewtech" গায়েব হয়ে আবার শূন্য হবে */
            100% { width: 0; }                      /* লুপ রিসেট */
        }

        /* কার্সার ব্লিংকিং ইফেক্ট */
        @keyframes blinkCursor {
            from, to { border-color: transparent }
            50% { border-color: var(--primary-green); }
        }

        .about-btn {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .about-btn:hover {
            background: var(--accent-green);
            transform: translateY(-1px);
        }

        /* --- Main Layout --- */
        .container {
            display: grid;
            grid-template-columns: 340px 1fr; 
            flex: 1;
            padding: 1.5rem;
            gap: 1.5rem;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
            height: calc(100vh - 70px); 
            overflow: hidden;
        }

        /* --- Sidebar (Style List) --- */
        .sidebar {
            background: var(--white);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255, 255, 255, 0.7);
            overflow: hidden;
        }

        .search-container {
            padding: 1.2rem;
            background: #fcfdfe;
            border-bottom: 1px solid var(--border-light);
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            outline: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            background: #fafdfb;
        }

        .search-input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 4px rgba(31, 136, 104, 0.12);
            background: var(--white);
        }

        .style-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.4rem;
        }

        /* স্ক্রোলবার স্টাইল */
        .style-list::-webkit-scrollbar, 
        .main-content::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .style-list::-webkit-scrollbar-thumb, 
        .main-content::-webkit-scrollbar-thumb {
            background-color: #b2dbcf;
            border-radius: 10px;
        }

        .style-item {
            padding: 12px 18px;
            margin-bottom: 4px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #2c4e43;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .style-item:hover { 
            background: #f0faf6; 
            color: var(--primary-green);
        }
        
        .style-item.active {
            background: #e2f5ee;
            color: var(--primary-green);
            font-weight: 700;
            box-shadow: inset 4px 0 0 var(--primary-green);
        }

        /* --- Main Content Area --- */
        .main-content {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 1.5rem;
            overflow-y: auto;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .style-header-card {
            background: var(--white);
            padding: 1.2rem 1.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            animation: fadeIn 0.2s ease;
        }

        .style-header-card h2 {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 0.6rem;
        }

        .oc-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .oc-badge {
            background: #e2f5ee;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary-green);
            border: 1px solid #bcead9;
            font-family: monospace;
        }

        /* --- BOM Table --- */
        .table-card {
            background: var(--white);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            animation: fadeIn 0.3s ease;
        }

        .table-card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #154e3f;
            border-left: 4px solid var(--accent-green);
            padding-left: 8px;
        }

        .table-wrapper {
            overflow-x: auto; 
            border-radius: 12px;
            border: 1px solid #e6f2ee;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 500px; 
        }

        th {
            background: #f2faf6;
            padding: 12px 16px;
            font-size: 0.85rem;
            color: var(--primary-green);
            font-weight: 700;
            border-bottom: 2px solid var(--border-light);
            text-transform: uppercase;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #edf5f2;
            font-size: 0.9rem;
        }

        tr:hover td {
            background-color: #fafdfc;
        }

        .pdm-badge { 
            background: #e3f2fd; 
            color: #1565c0; 
            padding: 4px 8px; 
            border-radius: 6px; 
            font-family: monospace; 
            font-weight: 600;
        }
        
        .tw-badge { 
            background: #fff3e0; 
            color: #e65100; 
            padding: 4px 8px; 
            border-radius: 6px; 
            font-family: monospace; 
            font-weight: 700; 
        }

        .empty-badge {
            color: #b0c4de;
            font-style: italic;
            font-size: 0.85rem;
        }

        /* --- Modal --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            justify-content: center; align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal-content {
            background: white; 
            padding: 1.5rem; 
            border-radius: 20px; 
            width: 100%;
            max-width: 360px; 
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .modal-content p {
            margin: 8px 0;
            font-size: 0.95rem;
            text-align: left;
            padding: 8px 12px;
            background: #f7fbf9;
            border-radius: 8px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 850px) {
            body {
                overflow: auto; 
            }
            .container {
                grid-template-columns: 1fr;
                height: auto; 
                padding: 1rem;
                gap: 1rem;
            }
            .sidebar {
                max-height: 280px; 
            }
            .main-content {
                padding: 1rem;
                backdrop-filter: none;
                background: transparent;
                box-shadow: none;
                border: none;
            }
            header {
                padding: 0.8rem 1rem;
            }
            .brand-text {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

<header>
    <!-- নতুন টাইপিং এবং ডিলে ইরেজিং কন্টেইনার -->
    <div class="brand-container">
        <div class="brand-text">Sewtech Fashion Limited</div>
    </div>
    <button class="about-btn" id="aboutBtn">👤 About Me</button>
</header>

<div class="container">
    <aside class="sidebar">
        <div class="search-container">
            <input type="text" id="styleSearch" class="search-input" placeholder="Search Style (e.g. 1247)..." autocomplete="off">
        </div>
        <div class="style-list" id="styleList"></div>
    </aside>

    <main class="main-content" id="mainContent">
        <div style="text-align: center; margin: 80px 0; color: #7b9e94;">
            <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 8px;">Welcome to Cutting Dept Tool</h2>
            <p style="font-weight: 500; font-size: 0.95rem;">Please select a Style Code from the directory to see component details.</p>
        </div>
    </main>
</div>

<div class="modal" id="aboutModal">
    <div class="modal-content">
        <h3 style="color: var(--primary-green)">User Profile</h3>
        <hr style="margin-bottom: 12px; border: 0; border-top: 1px solid #eee;">
        <p><strong>Name:</strong> Omar Faruk</p>
        <p><strong>ID:</strong> 60849422</p>
        <p><strong>Dept:</strong> Cutting</p>
        <button class="about-btn" style="margin-top: 15px; width: 100%; border-radius: 10px; padding: 10px;" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    const styleData = [
        { style: "1247", oc: ["758", "818", "818.2", ""] },
        { style: "2385", oc: ["650", "717", "756", ""] },
        { style: "3951", oc: ["657", "693", "738", "783.1"] },
        { style: "2950", oc: ["628", "", "", ""] },
        { style: "6316", oc: ["625", "", "", ""] },
        { style: "2953", oc: ["629", "", "", ""] },
        { style: "8515", oc: ["626", "", "", ""] },
        { style: "6357", oc: ["627", "", "", ""] },
        { style: "H448", oc: ["747", "", "", ""] },
        { style: "P448", oc: ["746", "", "", ""] },
        { style: "P443", oc: ["743", "", "", ""] },
        { style: "2020", oc: ["686", "", "", ""] },
        { style: "3100", oc: ["887", "", "", ""] },
        { style: "3099", oc: ["885", "", "", ""] },
        { style: "3097", oc: ["883", "", "", ""] },
        { style: "3098", oc: ["884", "", "", ""] },
        { style: "3101", oc: ["886", "", "", ""] },
        { style: "H438", oc: ["744", "", "", ""] },
        { style: "H534", oc: ["745", "", "", ""] },
        { style: "0163", oc: ["648", "691", "771", ""] },
        { style: "P534", oc: ["748", "745", "", ""] },
        { style: "439", oc: ["628", "", "", ""] },
        { style: "3584", oc: ["755", "815.1", "818.2", ""] },
        { style: "1X305", oc: ["176", "", "", ""] },
        { style: "H557", oc: ["793", "", "", ""] },
        { style: "H573", oc: ["874", "", "", ""] },
        { style: "H535", oc: ["873", "", "", ""] },
        { style: "H580", oc: ["875", "", "", ""] },
        { style: "H555", oc: ["876", "", "", ""] }
    ];

    const bomData = {
        "1247": [
            { component: "Shell Fabric", pdm: "120360", tw: "FAB-FLAT-0227" },
            { component: "Lining 1", pdm: "120364", tw: "FAB-CANVAS-0215" }
        ],
        "2385": [
            { component: "Shell Fabric", pdm: "120364", tw: "FAB-CANVAS-0215" },
            { component: "Lining-1", pdm: "058818", tw: "FAB-FLEECE-0005" },
            { component: "Lining-2", pdm: "072367", tw: "FAB-PLAIN-0110" },
            { component: "Lining-3", pdm: "025866", tw: "FAB-PLAIN-0216" },
            { component: "Lining-4", pdm: "004476", tw: "FAB-TRICOT-0013" },
            { component: "Insulation", pdm: "106365", tw: "FAB-PLAIN-0230" },
            { component: "Insulation-1", pdm: "110671", tw: "" },
            { component: "Neddle Punch", pdm: "300031", tw: "FAB-PLAIN-0210" },
            { component: "Screem", pdm: "", tw: "" }
        ],
        "3951": [
            { component: "SH-A", pdm: "129988", tw: "FAB-PLAIN-0198" },
            { component: "Lining-1", pdm: "69683", tw: "FAB-PLAIN-0199" },
            { component: "Lining-2", pdm: "122599", tw: "FAB-PLAIN-0201" },
            { component: "Lining-3", pdm: "72367", tw: "FAB-PLAIN-0110" },
            { component: "Lining-4", pdm: "032201", tw: "FAB-PLAIN-0202" },
            { component: "Lining-5", pdm: "004476", tw: "FAB-TRICOT-0013" },
            { component: "Padding-1 (80 GSM)", pdm: "106364", tw: "FAB-PLAIN-0211" },
            { component: "Padding-2 (60 GSM)", pdm: "106363", tw: "FAB-PLAIN-0209" },
            { component: "Neddle Punch White", pdm: "300031", tw: "FAB-PLAIN-0210" },
            { component: "Interlinin & Heavy-2", pdm: "011958", tw: "" },
            { component: "Interlinin & Soft-1", pdm: "011960", tw: "" }
        ]
    };

    const styleListEl = document.getElementById('styleList');
    const mainContentEl = document.getElementById('mainContent');
    const styleSearchInput = document.getElementById('styleSearch');

    function renderStyles(filter = "") {
        styleListEl.innerHTML = "";
        const filtered = styleData.filter(s => s.style.toLowerCase().includes(filter.toLowerCase()));
        
        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'style-item';
            div.innerHTML = `<span>Style: <b>${item.style}</b></span> <span>▶</span>`;
            div.onclick = () => loadStyleDetails(item.style);
            styleListEl.appendChild(div);
        });
    }

    function loadStyleDetails(styleCode) {
        document.querySelectorAll('.style-item').forEach(el => el.classList.remove('active'));
        const activeItem = [...document.querySelectorAll('.style-item')].find(el => el.innerText.includes(styleCode));
        if(activeItem) activeItem.classList.add('active');

        const styleObj = styleData.find(s => s.style === styleCode);
        const components = bomData[styleCode] || [];

        let ocBadges = styleObj.oc.filter(o => o.trim() !== "").map(o => `<span class="oc-badge">OC: ${o}</span>`).join("");
        if(!ocBadges) ocBadges = `<span class="empty-badge">No OC registered</span>`;

        let tableRows = components.map(c => `
            <tr>
                <td style="font-weight: 600; color: #1e3b33;">${c.component}</td>
                <td>${c.pdm ? `<span class="pdm-badge">${c.pdm}</span>` : `<span class="empty-badge">N/A</span>`}</td>
                <td>${c.tw ? `<span class="tw-badge">${c.tw}</span>` : `<span class="empty-badge">N/A</span>`}</td>
            </tr>
        `).join("");

        if(components.length === 0) {
            tableRows = `<tr><td colspan="3" style="text-align:center; color:#999; padding:25px; font-style: italic;">No BOM Component Data found for this style.</td></tr>`;
        }

        mainContentEl.innerHTML = `
            <div class="style-header-card">
                <h2 style="color: var(--primary-green)">Style Code: ${styleCode}</h2>
                <div class="oc-row">${ocBadges}</div>
            </div>

            <div class="table-card">
                <h3>Fabric & Component BOM</h3>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Component Name</th>
                                <th>PDM Code</th>
                                <th>Trackwel Code</th>
                            </tr>
                        </thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                </div>
            </div>
        `;

        if (window.innerWidth <= 850) {
            mainContentEl.scrollIntoView({ behavior: 'smooth' });
        }
    }

    styleSearchInput.oninput = (e) => renderStyles(e.target.value);

    const modal = document.getElementById('aboutModal');
    document.getElementById('aboutBtn').onclick = () => modal.style.display = 'flex';
    function closeModal() { modal.style.display = 'none'; }
    window.onclick = (e) => { if(e.target === modal) closeModal(); }

    renderStyles();
</script>
</body>
</html>
